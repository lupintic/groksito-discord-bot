name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build Python distributions (sdist + wheel)
        run: python -m build --sdist --wheel

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-pre') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          files: |
            dist/*.tar.gz
            dist/*.whl

      # ------------------------------------------------------------------
      # Docker images → GHCR
      # Bot target (full bot) and web target (dashboard only)
      # ------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract clean version (strip leading v)
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push bot image (full Discord bot)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: bot
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}

      - name: Build and push web image (dashboard only)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          push: true
          tags: ghcr.io/${{ github.repository }}-web:${{ steps.meta.outputs.version }}

      - name: Also tag :latest for stable releases (bot)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: bot
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
