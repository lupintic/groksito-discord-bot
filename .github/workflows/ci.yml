name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install build

    - name: Run tests
      run: python -m pytest -q --tb=short

    - name: Verify imports, version and CLI entrypoint
      run: |
        python -c "import groksito_discord; print('Version:', groksito_discord.__version__)"
        python -c "from groksito_discord.main import run; print('Entry point callable:', callable(run))"

    - name: Test packaging (build sdist + wheel)
      run: |
        python -m build --sdist --wheel --outdir dist-ci
        ls -l dist-ci/
